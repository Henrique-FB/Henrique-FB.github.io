<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>{{ page.title }}</title>
  <link rel="stylesheet" href="{{ site.baseurl }}/assets/styles/project-page-style.css">
  <link rel="stylesheet" href="{{ site.baseurl }}/assets/styles/sidebar-style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
  <script>
  (function(){
    var t=localStorage.getItem('theme')||(window.matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light');
    document.documentElement.setAttribute('data-theme',t);
  })();
  </script>
</head>




<body>
  <div class="layout">

    <aside class="sidebar">
      {% include sidebar.html %}
    </aside>




    <main class="content">
      <p class="emphasized">{{ page.project_date }}</p>

      <div class="project-page">
        {{ content }}
      </div>
    </main>



  </div>
  <script src="{{ site.baseurl }}/theme.js"></script>
</body>
</html>
